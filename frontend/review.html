<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Review | Crowdfunding Data Analytics</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="page-bg review-bg"></body>
  <div class="overlay"></div>

  <header class="navbar">
    <div class="brand">
      <span class="brand-logo">₹</span>
      <span>Crowdfunding Data Analytics</span>
    </div>
    <nav>
      <a href="home.html">Home</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="insights.html">Insights</a>
      <a href="predict.html">Prediction</a>
      <a href="review.html" class="active">Review</a>
      <a href="logout.html">Logout</a>
    </nav>
  </header>

  <main class="page-container">
    <section class="review-wrapper glass">
      <h1>Share Your Feedback</h1>
      <p>Your feedback helps improve the application experience.</p>

      <form id="reviewForm" class="form-card">
        <label for="reviewName">Name</label>
        <input type="text" id="reviewName" placeholder="Enter your name" required />

        <label for="reviewEmail">Email</label>
        <input type="email" id="reviewEmail" placeholder="Enter your email" required />

        <label for="rating">Rating</label>
        <select id="rating" required>
          <option value="">Select rating</option>
          <option>Excellent</option>
          <option>Very Good</option>
          <option>Good</option>
          <option>Average</option>
        </select>

        <label for="feedback">Feedback</label>
        <textarea id="feedback" rows="5" placeholder="Write your feedback here..." required></textarea>

        <button type="submit" class="btn-primary">Submit Feedback</button>

        <p id="reviewMessage" class="success-message"></p>
      </form>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
