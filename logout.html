<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logout | Crowdfunding Data Analysis</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="page-bg logout-bg">
  <div class="overlay"></div>

  <main class="logout-wrapper glass">
    <h1>You have been logged out</h1>
    <p>Thank you for using the Crowdfunding Data Analysis Web Application.</p>
    <a href="login.html" class="btn-primary">Go to Login</a>
  </main>

  <script>
   
  fetch("http://localhost:5000/api/logout", {
    method: "POST",
    credentials: "include"
  })
    .then(() => {
      localStorage.removeItem("loggedInUser");
    })
    .catch(() => {
      localStorage.removeItem("loggedInUser");
    });

</script>
  
</body>
</html>
